<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e1726" />
      <stop offset="100%" stop-color="#050810" />
    </radialGradient>
    <!-- Text/Glow Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" /> <!-- Teal-400 -->
      <stop offset="100%" stop-color="#0ea5e9" /> <!-- Sky-500 -->
    </linearGradient>
    <!-- Subtle drop shadow filter for premium 3D/glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded Base Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer glowing circle ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#glowGrad)" stroke-width="8" opacity="0.3" />
  
  <!-- Monogram text 'SP' -->
  <text x="50%" y="54%" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="220" 
        font-weight="900" 
        fill="url(#glowGrad)" 
        text-anchor="middle" 
        dominant-baseline="middle"
        letter-spacing="-10"
        filter="url(#glow)">SP</text>
</svg>
